<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="baidu-site-verification" content="BXbiiTnAMS" />
    <title>TQK</title>
    <link href="https://fonts.googleapis.com/css?family=Rubik+Mono+One" rel="stylesheet">
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Rubik Mono One', sans-serif;
            background: #22292C;
            position: relative;
            margin:0;
        }

        svg {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0px;
            left: 0px;
        }

        .input {
            position: absolute;
            font-size: 2em;
            text-align: center;
            left: 50%;
            transform: translateX(-50%);
            font-family: helvetica, sans-serif;
            bottom: 20px;
            background: none;
            border: 1px solid #ddd;
            color: #eee;
        }

        .text,.offscreen-text {
            position: absolute;
            top: 50%;
            width: 100%;
            transform: translateY(-50%);
            display: block;
            margin: 0;
        }

        .offscreen-text {
            text-align: center;
            top: -9999px;
        }

        .text span {
            position: absolute;
        }
        @media (min-width:400px){
            .face,.btn {
                position: absolute;
                left: 50%;
                transform: translateX(-50%);

            }
            .face {
                position: absolute;
                top: 10%;
                z-index:100;
            }
            .face img {
                width: 10em;
                border-radius: 50%;
                box-shadow: 0em 0em 3em #fff;
            }
            .face:hover img,.face:active img{
                width:8em;
            }
            .btn {
                top: 70%;
                font-size: 1.5em;
                background-color: skyblue;
                border: none;
                border-radius: 2em;
                color: #214c5f;
                box-shadow: 0em 0em 1em #fff;
                cursor: pointer;
                z-index:100;
                outline: none;
                padding: 0.2em 1em;
            }
            .btn:hover,.btn:active{
                padding: 0.3em 1.1em;
            }
        }

        @media (max-width:400px){
            .face,.btn {
                position: absolute;
                left: 50%;
                transform: translateX(-50%);

            }
            .face {
                position: absolute;
                top: 10%;
                z-index:100;
            }
            .face img {
                width: 10em;
                border-radius: 50%;
                box-shadow: 0em 0em 3em #fff;
            }
            .face:active img{
                width:8em;
            }
            .btn {
                top: 70%;
                font-size: 1.5em;
                background-color: skyblue;
                border: none;
                border-radius: 1.5em;
                color: #214c5f;
                box-shadow: 0em 0em 1em #fff;
                cursor: pointer;
                z-index: 100;
                outline: none;
                padding: 0.2em 1em;
            }
            .btn:active{
                padding: 0.4em 1.2em;
            }
        }
    </style>
    <script>
        (function(){
            var bp = document.createElement('script');
            var curProtocol = window.location.protocol.split(':')[0];
            if (curProtocol === 'https'){
                bp.src = 'https://zz.bdstatic.com/linksubmit/push.js';
            }
            else{
                bp.src = 'http://push.zhanzhang.baidu.com/push.js';
            }
            var s = document.getElementsByTagName("script")[0];
            s.parentNode.insertBefore(bp, s);
        })();
    </script>
</head>

<body>
    <iframe src="/bg/bg_weixing/index.html" frameborder="0" width="100%" height="100%"></iframe>
    <!-- <a href="/home/index" class="face">
        <img src="/img/avatar.jpg" alt="">
    </a> -->
    <button class="btn" onclick="location.href='/home/index'">听曲客 ♂</button>

    <p id="offscreen-text" class="offscreen-text"></p>
    <p id="text" class="text"></p>
    <svg id="svg"> </svg>
    <input type="hidden" class="input" , id="input" />

    <script src='/show_index/index_1/js/CSSPlugin.min.js'></script>
    <script src='/show_index/index_1/js/EasePack.min.js'></script>
    <script src='/show_index/index_1/js/TweenLite.min.js'></script>
    <script src="/show_index/index_1/js/index.js"></script>
</body>

</html>
