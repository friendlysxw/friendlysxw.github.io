## 文章分类设置
cate_config:
   show_count: true
   show_current: true

## 文章归档设置
arch_config:
   type: 'monthly'
   format: 'YYYY年MM月'
   show_count: true
   order: -1

## 标签云设置
tagcloud:
  tag3d: false
  textColour: '#444'
  outlineMethod: 'block'
  outlineColour: '#FFDAB9'
  interval: 30
  freezeActive: true
  frontSelect: true
  reverse: true
  wheelZoom: false

## 友链设置
links:
  - IT全栈大佬(胖胖): http://47.93.213.15/
  - 超强音乐外链网站(站长推荐): https://music.liuzhijin.cn/

# 主题自定义个性化配置

## 网站宣传语
branding: 技术交流共享，代码改变世界

## 设置banner背景图片
banner:
    img: /img/banner_6.jpg

## 设置carousel{@img:图片地址,@url:点击跳转链接(默认值:"javascript:")} 类似于广告位图片与地址
carousel:
  img: ''
  url: 'javascript:'

## 首页列表底部面板
homePanel: true

## 缩略图自定义随机图片
defaultImgs: 
    - /img/default_1.jpg

## 截取文章首页描述字数
excerptLength: 120

## 是否开启文章目录
toc: true

## 代码高亮配置
highlightTheme: default 

## bootstrap配置
bootstrap:

## ICON配置
fontAwesome:

## 文章过期提醒功能
warning:
  days: 300
  text: '本文于%d天之前发表，时代发展太快，文中内容可能已经过时。'

## 文章内声明
declaration:
  enable: false
  title: '转载声明'
  tip: |-
       商业转载请联系作者获得授权,非商业转载请注明出处 © <a href="" target="_blank">Snippet</a>

## 文章打赏
reward:
  alipay: ''
  # wepay: '../img/reward-wepay.jpg'
  tip: 赞赏是不耍流氓的鼓励

